name: Emerald Skyline CI/CD
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.10"
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  lint-pipeline:
    name: Lint Pipeline YAML (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint (config smell gate)
        uses: rhysd/actionlint@v1.7.7

  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      be: ${{ steps.filter.outputs.be }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      ai: ${{ steps.filter.outputs.ai }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            be:     ['be/**']
            web:    ['web-fe/**']
            mobile: ['mobile-fe/**']
            ai:     ['ai/**']

  labeler:
    name: Auto Label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: true

  code-quality:
    name: Check Quality (Biome) + Record Start Time
    runs-on: ubuntu-latest
    outputs:
      pipeline_start: ${{ steps.record_start.outputs.start_time }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # D1 — Lead Time: ghi timestamp bắt đầu pipeline
      - name: Record Pipeline Start Time
        id: record_start
        run: echo "start_time=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - uses: biomejs/setup-biome@v2
      - name: Biome CI (hard gate)
        run: biome ci --changed --since=main --no-errors-on-unmatched .

  lint-ai:
    name: Lint + Test AI Service (Python)
    needs: [changes, code-quality]
    if: needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: ai/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov
          cd ai && pip install -r requirements.txt

      - name: Lint - Critical errors only (safe gate)
        run: |
          cd ai
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: Lint - Style (soft check)
        continue-on-error: true
        run: |
          cd ai
          flake8 . \
            --max-complexity=15 \
            --max-line-length=140 \
            --ignore=W293,W291 \
            --statistics

      - name: Test with pytest (coverage >=55%)
        run: |
          cd ai
          pytest --tb=short \
                --cov=app \
                --cov-report=term-missing \
                --cov-fail-under=55

  build-backend:
    name: Build Backend (Docker)
    needs: [changes, code-quality]
    if: needs.changes.outputs.be == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Record build start
        id: build_start
        run: echo "t=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Build Docker Image (GHA cache, mode=max)
        uses: docker/build-push-action@v6
        with:
          context: ./be
          load: true
          tags: emerald-be:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Artifact & Speed Report
        uses: ./.github/actions/docker-report
        with:
          report_title: Backend Artifact Report
          image_name: emerald-be:latest
          build_start: ${{ steps.build_start.outputs.t }}

  build-ai:
    name: Build AI Service (Docker)
    needs: [changes, code-quality]
    if: needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Record build start
        id: build_start
        run: echo "t=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Build AI Image (GHA cache, mode=max)
        uses: docker/build-push-action@v6
        with:
          context: ./ai
          load: true
          tags: emerald-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Artifact & Speed Report
        uses: ./.github/actions/docker-report
        with:
          report_title: AI Service Artifact Report
          image_name: emerald-ai:latest
          build_start: ${{ steps.build_start.outputs.t }}

  build-frontend:
    name: Build React Web
    needs: [changes, code-quality]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web-fe/package-lock.json

      - name: Record build start
        id: build_start
        run: echo "t=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Deterministic Dependency Installation
        run: cd web-fe && npm ci

      - name: Production Build
        run: cd web-fe && npm run build

      - name: Bundle Size & Build Time Report
        run: |
          BUILD_END=$(date -u +%s)
          BUILD_DURATION=$(( BUILD_END - ${{ steps.build_start.outputs.t }} ))

          DIST_DIR="web-fe/dist"
          [ -d "$DIST_DIR" ] || DIST_DIR="web-fe/build"

          GZIP_SIZE=$(find "$DIST_DIR" -type f -print0 | xargs -0r gzip -c | wc -c)
          GZIP_MB=$(echo "scale=2; ${GZIP_SIZE} / 1048576" | bc)

          {
            echo "### Frontend Build Analytics"
            echo ""
            echo "**Build duration:** \`${BUILD_DURATION}s\` (target: < 120s cached)"
            echo ""

            echo "#### Bundle Size — Raw"
            echo '```text'
            du -sh "$DIST_DIR"
            echo '```'

            echo "#### Bundle Size — Gzip Estimate (Best Practice)"
            echo "**Estimated gzip total:** \`${GZIP_MB} MB\` (target: < 2 MB)"
            if [ "$(echo "${GZIP_MB} < 2" | bc -l)" -eq 1 ]; then
              echo "**Status:** PASS - Within target"
            else
              echo "**Status:** FAIL - Exceeds 2 MB gzip target (consider code splitting)"
            fi
            echo ""

            echo "#### Top 5 Largest Files"
            echo "| File Path | Size |"
            echo "| :--- | :--- |"
            find "$DIST_DIR" -type f -exec du -h {} + | sort -rh | head -n 5 \
              | awk '{print "| " $2 " | " $1 " |"}'
          } >> "$GITHUB_STEP_SUMMARY"

  frontend-tests:
    name: Test Frontend (Unit + Integration/Coverage)
    needs: [changes, code-quality]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web-fe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web-fe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: PR gate (fast)
        if: github.event_name == 'pull_request'
        run: |
          npm run test:unit
          npm run test:integration
          npm run test:e2e

      - name: Main gate (coverage >= 35%)
        if: github.ref == 'refs/heads/main'
        run: npm run test:coverage

      - name: Frontend test summary
        if: always()
        run: |
          {
            echo "### Frontend Test Gate"
            echo ""
            echo "- Event: ${{ github.event_name }}"
            echo "- Ref: ${{ github.ref_name }}"
            echo "- PR: unit + integration + e2e"
            echo "- main: coverage gate from Vitest config (>=35%)"
          } >> "$GITHUB_STEP_SUMMARY"

  mobile-tests:
    name: Test Mobile (Unit + Integration/Coverage)
    needs: [changes, code-quality]
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile-fe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mobile-fe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: PR gate (fast)
        if: github.event_name == 'pull_request'
        run: |
          npm run test:unit
          npm run test:integration

      - name: Main gate (coverage >= 35%)
        if: github.ref == 'refs/heads/main'
        run: npm run test:coverage

      - name: Mobile test summary
        if: always()
        run: |
          {
            echo "### Mobile Test Gate"
            echo ""
            echo "- Event: ${{ github.event_name }}"
            echo "- Ref: ${{ github.ref_name }}"
            echo "- PR: unit + integration"
            echo "- main: coverage gate from Vitest config (>=35%)"
          } >> "$GITHUB_STEP_SUMMARY"
  frontend-e2e:
    name: E2E Frontend (Playwright)
    needs: [changes, frontend-tests]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            web-fe/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          cd web-fe && npm ci

      - name: Install Playwright browser
        run: npm run e2e:install

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  framework-metric-tests:
    name: Framework Metric Tests (Inline)
    needs: [changes, code-quality]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run framework metric tests inline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WORKFLOW_FILE: ci.yml
          METRIC_DAYS: "30"
        run: |
          node <<'NODE'
          (async () => {
            const fs = require('node:fs');
            const path = require('node:path');

            const ownerRepo = process.env.GITHUB_REPOSITORY;
            const token = process.env.GITHUB_TOKEN;
            const workflowFile = process.env.WORKFLOW_FILE || 'ci.yml';
            const days = Number(process.env.METRIC_DAYS || '30');
            const summaryPath = process.env.GITHUB_STEP_SUMMARY;

            if (!ownerRepo) throw new Error('Missing GITHUB_REPOSITORY env');
            if (!token) throw new Error('Missing GITHUB_TOKEN env');
            if (!summaryPath) throw new Error('Missing GITHUB_STEP_SUMMARY env');

            const [owner, repo] = ownerRepo.split('/');
            if (!owner || !repo) throw new Error(`Invalid GITHUB_REPOSITORY: ${ownerRepo}`);

            const headers = {
              Accept: 'application/vnd.github+json',
              Authorization: `Bearer ${token}`,
              'X-GitHub-Api-Version': '2022-11-28',
            };

            const ghGet = async (url) => {
              const response = await fetch(url, { headers });
              if (!response.ok) {
                throw new Error(`GitHub API error ${response.status} at ${url}\n${await response.text()}`);
              }
              return response.json();
            };

            const parseSeconds = (startedAt, completedAt) => {
              if (!startedAt || !completedAt) return null;
              const delta = (new Date(completedAt).getTime() - new Date(startedAt).getTime()) / 1000;
              return Number.isFinite(delta) && delta >= 0 ? Math.round(delta) : null;
            };

            const avg = (values) => values.length ? Math.round(values.reduce((sum, value) => sum + value, 0) / values.length) : null;
            const percentile = (values, p) => {
              if (!values.length) return null;
              const sorted = [...values].sort((a, b) => a - b);
              const index = Math.ceil((p / 100) * sorted.length) - 1;
              return sorted[Math.max(0, Math.min(sorted.length - 1, index))];
            };

            const fetchRuns = async () => {
              const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
              const runs = [];
              let page = 1;

              while (true) {
                const url = `https://api.github.com/repos/${owner}/${repo}/actions/workflows/${workflowFile}/runs?per_page=100&page=${page}`;
                const data = await ghGet(url);
                const pageRuns = data.workflow_runs || [];
                if (!pageRuns.length) break;

                let stop = false;
                for (const run of pageRuns) {
                  if (new Date(run.created_at).getTime() < cutoff) {
                    stop = true;
                    continue;
                  }
                  runs.push(run);
                }

                if (stop || pageRuns.length < 100) break;
                page += 1;
              }

              return runs;
            };

            const fetchJobs = async (runId) => {
              const jobs = [];
              let page = 1;

              while (true) {
                const url = `https://api.github.com/repos/${owner}/${repo}/actions/runs/${runId}/jobs?per_page=100&page=${page}`;
                const data = await ghGet(url);
                const pageJobs = data.jobs || [];
                if (!pageJobs.length) break;
                jobs.push(...pageJobs);
                if (pageJobs.length < 100) break;
                page += 1;
              }

              return jobs;
            };

            const ciYaml = fs.readFileSync(path.join(process.env.GITHUB_WORKSPACE, '.github', 'workflows', 'ci.yml'), 'utf8');
            const hasActionlint = /actionlint/.test(ciYaml);
            const hasSlackFailureNotification = /Notify Slack on Failure/.test(ciYaml);
            const hasPathFilter = /dorny\/paths-filter@v3/.test(ciYaml);
            const hasCoverageGate = /--cov-fail-under=\d+/.test(ciYaml);
            const aiLintBlockMatch = ciYaml.match(/- name: Lint — Complexity gate \(hard block, max-complexity=10\)[\s\S]*?- name: Test with pytest/);
            const aiLintBlock = aiLintBlockMatch ? aiLintBlockMatch[0] : '';
            const hasComplexityHardGate = /--max-complexity=15/.test(ciYaml);
            const hardcodedVersionCount = (ciYaml.match(/(node-version|python-version|java-version):\s*["']?\d+(?:\.\d+)?["']?/g) || []).length;
            const setupNodeUseCount = (ciYaml.match(/actions\/setup-node@v4/g) || []).length;
            const workflowLines = ciYaml.split('\n').length;

            const runs = await fetchRuns();
            const runJobs = [];
            for (const run of runs) {
              const jobs = await fetchJobs(run.id);
              runJobs.push({ runId: run.id, jobs });
            }

            const backendBuildDurations = [];
            const aiBuildDurations = [];
            const frontendBuildDurations = [];
            const leadTimes = [];
            const deployJobs = [];

            for (const row of runJobs) {
              const run = runs.find((candidate) => candidate.id === row.runId);
              if (!run) continue;

              for (const job of row.jobs) {
                const durationSec = parseSeconds(job.started_at, job.completed_at);

                if (job.name === 'Build Backend (Docker)' && durationSec !== null) backendBuildDurations.push(durationSec);
                if (job.name === 'Build AI Service (Docker)' && durationSec !== null) aiBuildDurations.push(durationSec);
                if (job.name === 'Build React Web' && durationSec !== null) frontendBuildDurations.push(durationSec);

                if (job.name === 'Deploy Backend to Render' || job.name === 'Deploy Frontend to Vercel') {
                  deployJobs.push({ run, job });
                  const leadSec = parseSeconds(run.created_at, job.completed_at);
                  if (leadSec !== null) leadTimes.push(leadSec);
                }
              }
            }

            const runSuccessCount = runs.filter((run) => run.conclusion === 'success').length;
            const rerunSuccessCount = runs.filter((run) => run.run_attempt > 1 && run.conclusion === 'success').length;
            const deploySuccessCount = deployJobs.filter(({ job }) => job.conclusion === 'success').length;
            const deployFailureCount = deployJobs.filter(({ job }) => job.conclusion === 'failure').length;
            const dockerDurations = [...backendBuildDurations, ...aiBuildDurations];
            const dockerCacheHitProxy = dockerDurations.length
              ? (dockerDurations.filter((seconds) => seconds < 60).length / dockerDurations.length) * 100
              : null;

            const checks = [];
            const push = (id, metric, value, target, status, evidence) => checks.push({ id, metric, value, target, status, evidence });
            const valueOrNA = (value) => (value === null || value === undefined ? 'N/A' : value);

            const leadP50 = percentile(leadTimes, 50);
            push('M1.2', 'Lead Time for Changes (p50)', valueOrNA(leadP50), '< 3600s', leadP50 === null ? 'N/A' : (leadP50 < 3600 ? 'PASS' : 'WARN'), 'Forsgren 2018 Elite threshold');

            const cfr = deploySuccessCount + deployFailureCount > 0
              ? Number(((deployFailureCount / (deploySuccessCount + deployFailureCount)) * 100).toFixed(2))
              : null;
            push('M2.1', 'Change Failure Rate', valueOrNA(cfr), '< 5%', cfr === null ? 'N/A' : (cfr < 5 ? 'PASS' : 'WARN'), 'Forsgren 2018 Elite threshold');

            push('M2.3', 'Test Coverage Gate', valueOrNA(hasCoverageGate), 'Enabled + cov-fail-under >=50', hasCoverageGate ? 'PASS' : 'FAIL', 'Zampetti 2020 testing bad smells');
            push('M2.4', 'Static Analysis Hard Gate', valueOrNA(hasComplexityHardGate), 'Enabled + no --exit-zero', hasComplexityHardGate ? 'PASS' : 'FAIL', 'Zampetti 2020 build bad smells');
            push('M2.5', 'Pipeline Config Smell Linter', valueOrNA(hasActionlint), 'Enabled', hasActionlint ? 'PASS' : 'FAIL', 'Vassallo 2020');

            const successRate = runs.length > 0 ? Number(((runSuccessCount / runs.length) * 100).toFixed(2)) : null;
            push('M3.2', 'Build Success Rate', valueOrNA(successRate), '>= 95%', successRate === null ? 'N/A' : (successRate >= 95 ? 'PASS' : 'WARN'), 'Zampetti 2020 + Shahin 2018');

            const flakyRate = runs.length > 0 ? Number(((rerunSuccessCount / runs.length) * 100).toFixed(2)) : null;
            push('M3.3', 'Flaky Job Rate (Proxy)', valueOrNA(flakyRate), '< 2%', flakyRate === null ? 'N/A' : (flakyRate < 2 ? 'PASS' : 'WARN'), 'Zampetti 2020');

            push('M3.4', 'Failure Notification Readiness', valueOrNA(hasSlackFailureNotification), 'Slack failure notification enabled', hasSlackFailureNotification ? 'PASS' : 'WARN', 'Shahin 2018 fast feedback');

            push('M4.5', 'Docker Cache Hit Rate (Proxy)', valueOrNA(dockerCacheHitProxy), '>= 70%', dockerCacheHitProxy === null ? 'N/A' : (dockerCacheHitProxy >= 70 ? 'PASS' : 'WARN'), 'Amor 2022 + Rosa 2025');

            push('M5.1', 'Path-based Change Detection', valueOrNA(hasPathFilter), 'Enabled', hasPathFilter ? 'PASS' : 'FAIL', 'Trase 2018 monorepo selective build');
            push('M5.4', 'Hardcoded Version String Count', hardcodedVersionCount, '0', hardcodedVersionCount === 0 ? 'PASS' : 'WARN', 'Dipenta 2021 + Vassallo 2020');
            push('M5.6', 'setup-node repetition count', setupNodeUseCount, 'Track duplication', 'PASS', 'Rahman 2020 + Dipenta 2021');
            push('M5.6', 'workflow LOC', workflowLines, 'Track size', 'PASS', 'Rahman 2020 + Dipenta 2021');

            const passCount = checks.filter((check) => check.status === 'PASS').length;
            const failCount = checks.filter((check) => check.status === 'FAIL').length;
            const warnCount = checks.filter((check) => check.status === 'WARN').length;
            const naCount = checks.filter((check) => check.status === 'N/A').length;

            const lines = [
              '# CI/CD Metric Test Report',
              '',
              `- Repository: ${ownerRepo}`,
              `- Workflow: ${workflowFile}`,
              `- Analysis window: ${days} days`,
              `- Workflow runs analyzed: ${runs.length}`,
              `- Deploy jobs analyzed: ${deployJobs.length}`,
              '',
              '| Metric ID | Metric | Value | Target | Status | Evidence Source |',
              '| :--- | :--- | :--- | :--- | :--- | :--- |',
            ];

            for (const check of checks) {
              lines.push(`| ${check.id} | ${check.metric} | ${check.value} | ${check.target} | ${check.status} | ${check.evidence} |`);
            }

            lines.push('', `- PASS: ${passCount}`, `- FAIL: ${failCount}`, `- WARN: ${warnCount}`, `- N/A: ${naCount}`);
            fs.writeFileSync(summaryPath, `${lines.join('\n')}\n`, 'utf8');

            console.log(`[framework-metric-tests] Fail count: ${failCount}`);
            console.log(`[framework-metric-tests] Warn count: ${warnCount}`);

            if (failCount > 0) process.exit(1);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Publish framework metric report
        if: always()
        run: |
          echo "### Framework Metric Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  test-backend:
    name: Test Backend (Jest + Coverage)
    needs: [changes, code-quality]
    if: needs.changes.outputs.be == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: be

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: be/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create Backend CI Environment
        env:
          DB_URL: ${{ secrets.E2E_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ACCESS_SECRET: ${{ secrets.JWT_SECRET || 'ci-e2e-access-secret' }}
          REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-e2e-refresh-secret' }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "::error::Missing E2E_DATABASE_URL. Add it as a GitHub Actions variable that points to a dedicated test database."
            exit 1
          fi
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "::error::Missing Supabase config. Add SUPABASE_URL as a variable and SUPABASE_KEY as a secret."
            exit 1
          fi

          cat > .env <<EOF
          DATABASE_URL=$DB_URL
          E2E_DATABASE_URL=$DB_URL
          JWT_SECRET=$ACCESS_SECRET
          JWT_REFRESH_SECRET=$REFRESH_SECRET
          JWT_ACCESS_EXPIRES_IN=15m
          JWT_REFRESH_EXPIRES_IN=7d
          JWT_EXPIRATION=15m
          JWT_REFRESH_EXPIRATION=7d
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_KEY=$SUPABASE_KEY
          SUPABASE_BUCKET=$SUPABASE_BUCKET
          FRONTEND_URL=http://localhost:5173
          BACKEND_URL=http://localhost:4000
          VNPAY_TMN_CODE=E2ETMN
          VNPAY_HASH_SECRET=ci-e2e-vnpay-hash-secret
          EOF

          cat .env >> "$GITHUB_ENV"

      - name: Run Tests with Coverage
        run: |
          npm run test:cov -- \
            --bail \
            --maxWorkers=2
        env:
          CI: true

      - name: Run Backend E2E Tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Coverage Reports
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./be/coverage/coverage-final.json
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Test Summary
        if: always()
        run: |
          {
            echo "### Backend Test Results"
            echo ""

            if [ -f "coverage/coverage-summary.json" ]; then
              echo "| Metric | Coverage |"
              echo "|--------|----------|"

              node -e "
                const fs = require('fs');
                const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8'));
                const total = summary.total;
                for (const key of Object.keys(total)) {
                  console.log(\`| \${key} | \${total[key].pct}% |\`);
                }
              "
            else
              echo "> No coverage report found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-backend:
    name: Deploy Backend to Render
    needs: [changes, build-backend, test-backend, code-quality, framework-metric-tests]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.be == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        id: deploy
        run: curl -fsSL -X GET ${{ secrets.RENDER_BE_DEPLOY_HOOK }}

      - name: Record DORA Metrics
        if: always()
        uses: ./.github/actions/dora-report
        with:
          report_title: Backend Deploy DORA Report
          pipeline_start: ${{ needs.code-quality.outputs.pipeline_start }}
          deploy_status: ${{ steps.deploy.outcome }}

      - name: Notify Slack on Failure
        if: failure()
        run: |
          curl -fsSL -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"*Backend deploy FAILED* on \`${{ github.ref_name }}\`\nCommit: \`${{ github.sha }}\`\nActor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: [changes, build-frontend, frontend-tests, frontend-e2e, code-quality, framework-metric-tests]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel Deploy Hook
        id: deploy
        run: curl -fsSL -X GET ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Record DORA Metrics
        if: always()
        uses: ./.github/actions/dora-report
        with:
          report_title: Frontend Deploy DORA Report
          pipeline_start: ${{ needs.code-quality.outputs.pipeline_start }}
          deploy_status: ${{ steps.deploy.outcome }}

      - name: Notify Slack on Failure
        if: failure()
        run: |
          curl -fsSL -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"*Frontend deploy FAILED* on \`${{ github.ref_name }}\`\nCommit: \`${{ github.sha }}\`\nActor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  release-mobile:
    name: Build & Release APK
    needs: [changes]
    # NOTE (Jaspan 2018): mobile release là tag-based event (v*), không phải
    # push thường. Tag chỉ được tạo khi mobile-fe có thay đổi thực sự,
    # nên selective build được đảm bảo ở tầng quy trình, không phải qua
    # paths-filter. Đây là ngoại lệ có chủ ý của path-based detection.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: mobile-fe/package-lock.json

      - name: Install JS Dependencies
        run: cd mobile-fe && npm ci

      - name: Expo Prebuild (Generate Native Android)
        run: cd mobile-fe && npx expo prebuild --platform android --no-install

      - name: Record build start
        id: build_start
        run: echo "t=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Build APK with Gradle
        run: |
          cd mobile-fe/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK Size & Build Time Report
        run: |
          BUILD_END=$(date -u +%s)
          BUILD_DURATION=$(( BUILD_END - ${{ steps.build_start.outputs.t }} ))
          APK_PATH="mobile-fe/android/app/build/outputs/apk/debug/app-debug.apk"

          if [ -f "$APK_PATH" ]; then
            APK_SIZE_HUMAN=$(du -sh "$APK_PATH" | cut -f1)
            APK_SIZE_BYTES=$(du -sb "$APK_PATH" | cut -f1)
            APK_SIZE_MB=$(echo "scale=2; ${APK_SIZE_BYTES} / 1048576" | bc)

            {
              echo "### Mobile APK Report"
              echo ""
              echo "| Metric | Value |"
              echo "| :--- | :--- |"
              echo "| APK size (human) | \`${APK_SIZE_HUMAN}\` |"
              echo "| APK size (MB) | \`${APK_SIZE_MB} MB\` (target: < 50 MB debug) |"
              echo "| APK size (bytes) | \`${APK_SIZE_BYTES}\` |"
              echo "| Build duration | \`${BUILD_DURATION}s\` |"
              echo "| Tag | \`${{ github.ref_name }}\` |"

              if [ "$(echo "${APK_SIZE_MB} > 50" | bc -l)" -eq 1 ]; then
                echo ""
                echo "**WARNING: APK exceeds 50 MB target for debug build**"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "APK file not found at expected path: \`${APK_PATH}\`" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mobile-fe/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # D3 — Failure notification (Slack)
      - name: Notify Slack on Failure
        if: failure()
        run: |
          curl -fsSL -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"*Mobile release FAILED* for tag \`${{ github.ref_name }}\`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
